<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026 - Fixture</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">
  <h1>Mundial 2026 - Fixture</h1>

  <div class="tabs">
    <button class="tab active" data-tab="groups">Grupos y Equipos</button>
    <button class="tab" data-tab="fixture">Fixture</button>
    <button class="tab" data-tab="results">Resultados</button>
  </div>

  <div id="groups" class="tab-content active"></div>

  <div id="fixture" class="tab-content">
    <p class="empty-msg">No hay partidos cargados. Agregue resultados en la pestaña Resultados.</p>
    <table id="fixture-table">
      <thead>
        <tr>
          <th>Local</th>
          <th>Visitante</th>
          <th>Goles Local</th>
          <th>Goles Visitante</th>
          <th>Fecha</th>
          <th>Fase</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div id="results" class="tab-content">
    <form id="result-form">
      <div class="form-row">
        <label for="local">Equipo Local:</label>
        <select id="local"></select>
      </div>
      <div class="form-row">
        <label for="visitor">Equipo Visitante:</label>
        <select id="visitor"></select>
      </div>
      <div class="form-row">
        <label for="goalsLocal">Goles Local:</label>
        <input type="number" id="goalsLocal" min="0" required>
      </div>
      <div class="form-row">
        <label for="goalsVisitor">Goles Visitante:</label>
        <input type="number" id="goalsVisitor" min="0" required>
      </div>
      <div class="form-row">
        <label for="phase">Fase:</label>
        <select id="phase">
          <option value="Grupo A">Grupo A</option>
          <option value="Grupo B">Grupo B</option>
          <option value="Grupo C">Grupo C</option>
          <option value="Grupo D">Grupo D</option>
          <option value="Grupo E">Grupo E</option>
          <option value="Grupo F">Grupo F</option>
          <option value="Grupo G">Grupo G</option>
          <option value="Grupo H">Grupo H</option>
          <option value="Grupo I">Grupo I</option>
          <option value="Grupo J">Grupo J</option>
          <option value="Grupo K">Grupo K</option>
          <option value="Grupo L">Grupo L</option>
          <option value="16avos">16avos</option>
          <option value="Octavos">Octavos</option>
          <option value="Cuartos">Cuartos</option>
          <option value="Semis">Semis</option>
          <option value="Final">Final</option>
        </select>
      </div>
      <div class="form-row">
        <label for="date">Fecha (YYYY-MM-DD):</label>
        <input type="text" id="date" placeholder="2026-06-11" required>
      </div>
      <button type="submit">Guardar Partido</button>
    </form>
    <div id="log"></div>
  </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
